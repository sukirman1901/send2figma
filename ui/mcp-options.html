<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Send2Figma — MCP</title>
    <style>
      @font-face {
        font-family: Epilogue;
        src: url("../fonts/Epilogue-Regular.ttf") format("truetype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: Epilogue;
        src: url("../fonts/Epilogue-Medium.ttf") format("truetype");
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: Epilogue;
        src: url("../fonts/Epilogue-SemiBold.ttf") format("truetype");
        font-weight: 600;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: Epilogue;
        src: url("../fonts/Epilogue-Bold.ttf") format("truetype");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      :root {
        color-scheme: dark;
        --back-a: #000000;
        --back-b: #0a0a0a;
        --back-c: #111111;
        --back-d: #1a1a1a;
        --text-a: #ffffff;
        --text-b: #b0b0b0;
        --text-c: #6b6b6b;
        --bor-a: #1f1f1f;
        --bor-b: #2a2a2a;
        --lime-a: #cdfe67;
        --lime-b: #89fe65;
        --danger: #ff6b6b;
        --radius: 20px;
        --ease: cubic-bezier(0.16, 1, 0.3, 1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Epilogue, system-ui, sans-serif;
        font-size: 13px;
        line-height: 1.45;
        color: var(--text-a);
        background:
          radial-gradient(1200px 600px at 80% -10%, #89fe6514, transparent 55%),
          radial-gradient(900px 500px at 0% 100%, #cdfe670c, transparent 50%),
          var(--back-a);
      }

      .page {
        max-width: 420px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      .panel {
        background: #000000f2;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: var(--radius);
        box-shadow:
          0 0 0 1px #ffffff08,
          0 8px 32px #00000080,
          0 20px 60px #0006;
        overflow: hidden;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        background: var(--back-b);
        border-bottom: 1px solid var(--bor-a);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .brand-mark {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        display: grid;
        place-items: center;
        background: var(--back-c);
        border: 1px solid var(--bor-a);
        color: var(--lime-b);
        flex-shrink: 0;
      }

      .brand-mark img {
        width: 20px;
        height: 20px;
        display: block;
      }

      .brand-name {
        font: 700 14px/1.2 Epilogue, sans-serif;
        color: var(--text-a);
      }

      .brand-sub {
        font: 500 11px/1.3 Epilogue, sans-serif;
        color: var(--text-c);
        margin-top: 2px;
      }

      .status-pill {
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        border-radius: 999px;
        border: 1px solid var(--bor-b);
        background: var(--back-d);
        font: 600 10px Epilogue, sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--text-b);
      }

      .status-pill::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--text-c);
      }

      .status-pill[data-state="connected"] {
        border-color: #89fe6540;
        color: var(--lime-b);
      }

      .status-pill[data-state="connected"]::before {
        background: var(--lime-b);
        box-shadow: 0 0 8px #89fe65aa;
      }

      .status-pill[data-state="connecting"] {
        border-color: #f0c14a55;
        color: #f0c14a;
      }

      .status-pill[data-state="connecting"]::before {
        background: #f0c14a;
      }

      .status-pill[data-state="disconnected"] {
        border-color: #ff6b6b44;
        color: #ff8a8a;
      }

      .status-pill[data-state="disconnected"]::before {
        background: var(--danger);
      }

      .body {
        padding: 16px;
      }

      .lead {
        margin: 0 0 16px;
        color: var(--text-b);
        font-size: 12px;
      }

      .section-label {
        font: 600 10px Epilogue, sans-serif;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-c);
        margin: 0 0 8px;
      }

      .field {
        margin-bottom: 14px;
      }

      .field-label {
        display: block;
        font: 500 11px Epilogue, sans-serif;
        color: var(--text-c);
        margin-bottom: 6px;
      }

      .input {
        width: 100%;
        height: 40px;
        border-radius: 10px;
        border: 1px solid var(--bor-a);
        background: var(--back-c);
        color: var(--text-a);
        padding: 0 12px;
        font: 500 12px ui-monospace, SFMono-Regular, Menlo, monospace;
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      .input:focus {
        border-color: var(--lime-b);
        box-shadow: 0 0 0 3px #89fe6526;
      }

      textarea.input {
        height: auto;
        min-height: 132px;
        padding: 10px 12px;
        resize: vertical;
        line-height: 1.45;
      }

      .multi-toggle-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--bor-a);
        background: var(--back-c);
      }

      .multi-toggle-label {
        font: 500 12px Epilogue, sans-serif;
        color: var(--text-b);
      }

      .switch {
        position: relative;
        width: 36px;
        height: 20px;
        flex-shrink: 0;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
        position: absolute;
      }

      .switch-track {
        position: absolute;
        inset: 0;
        border-radius: 999px;
        background: #2a2a2a;
        transition: background 0.15s ease;
      }

      .switch-thumb {
        position: absolute;
        top: 2px;
        left: 2px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fff;
        transition: transform 0.15s ease;
      }

      .switch input:checked + .switch-track {
        background: var(--lime-b);
      }

      .switch input:checked + .switch-track .switch-thumb {
        transform: translateX(16px);
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin: 4px 0 14px;
      }

      .btn {
        height: 36px;
        border-radius: 8px;
        border: 1px solid var(--bor-b);
        background: var(--back-d);
        color: var(--text-a);
        font: 600 12px Epilogue, sans-serif;
        cursor: pointer;
        transition: border-color 0.15s ease, background 0.15s ease;
      }

      .btn:hover {
        border-color: var(--bor-b);
        background: #222;
      }

      .btn-primary {
        grid-column: 1 / -1;
        border: 0;
        background: linear-gradient(to right, var(--lime-a), var(--lime-b));
        color: #000;
        font-weight: 700;
      }

      .btn-primary:hover {
        filter: brightness(1.05);
        background: linear-gradient(to right, var(--lime-a), var(--lime-b));
      }

      .hint {
        margin: 0;
        font-size: 11px;
        color: var(--text-c);
        line-height: 1.5;
      }

      .hint code {
        color: var(--lime-b);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 10px;
      }

      .toast {
        margin-top: 10px;
        font: 500 11px Epilogue, sans-serif;
        color: var(--lime-b);
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="panel">
        <div class="header">
          <div class="brand">
            <div class="brand-mark" aria-hidden="true">
              <img id="brandIcon" alt="" />
            </div>
            <div>
              <div class="brand-name">Web Clone MCP</div>
              <div class="brand-sub">Connect Cursor to the live tab</div>
            </div>
          </div>
          <div class="status-pill" id="status" data-state="disconnected">disconnected</div>
        </div>

        <div class="body">
          <p class="lead">
            Screenshots are pixel-accurate. Generated code is high-fidelity recreate context — not a
            guaranteed 100% compiler.
          </p>

          <div class="section-label">Bridge</div>
          <label class="multi-toggle-row">
            <span class="switch">
              <input type="checkbox" id="enabled" checked />
              <span class="switch-track"><span class="switch-thumb"></span></span>
            </span>
            <span class="multi-toggle-label">Enable MCP bridge</span>
          </label>

          <div class="field">
            <label class="field-label" for="port">Port</label>
            <input class="input" id="port" type="number" min="1024" max="65535" value="17321" />
          </div>

          <div class="field">
            <label class="field-label" for="token">Token</label>
            <input class="input" id="token" type="text" spellcheck="false" autocomplete="off" />
          </div>

          <div class="actions">
            <button type="button" class="btn" id="generate">Generate token</button>
            <button type="button" class="btn" id="copy">Copy Cursor config</button>
            <button type="button" class="btn btn-primary" id="save">Save &amp; reconnect</button>
          </div>

          <div class="section-label">Cursor config</div>
          <div class="field">
            <textarea class="input" id="config" readonly></textarea>
          </div>
          <p class="hint">
            In Cursor MCP, point at <code>mcp/dist/index.js</code> with the same
            <code>S2F_MCP_TOKEN</code>, then call <code>ping</code>.
          </p>
          <div class="toast" id="toast" aria-live="polite"></div>
        </div>
      </div>
    </div>
    <script src="mcp-options.js"></script>
  </body>
</html>
